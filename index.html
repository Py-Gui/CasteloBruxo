<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>CasteloBruxo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #video-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 177.78vh;
      height: 56.25vw;
      min-width: 100%;
      min-height: 100%;
      z-index: 0;
    }

    #video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: none;
    }

    #icons-container {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #icons-container img {
      width: 48px;
      height: 48px;
      object-fit: contain;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="icons-container">
    <img src="imagens/íconejornal.png" alt="Jornal">
  </div>

  <div id="video-container">
    <iframe
      src="https://player.vimeo.com/video/1178003266?autoplay=1&loop=1&muted=1&background=1&controls=0"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
