<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Castelo Bruxo</title>
  <style>
    @font-face {
      font-family: 'HarryPotter';
      src: url('imagens/HARRYP__.TTF') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .video-wrap {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      opacity: 1;
      transition: opacity 2s ease;
    }

    .video-wrap.oculto {
      opacity: 0;
      pointer-events: none;
    }

    iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 120vw;
      height: 67.5vw;
      min-height: 120vh;
      min-width: 213.33vh;
      transform: translate(-50%, -50%);
      border: none;
      pointer-events: none;
    }

    #wrap2 iframe {
      width: 120vw;
      height: 67.5vw;
      min-height: 120vh;
      min-width: 213.33vh;
    }

    @media (max-width: 768px) {
      #wrap2 iframe {
        width: 92vw;
        height: 67.5vw;
        min-height: 92vh;
        min-width: 213.33vh;
      }
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 5;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.5s ease;
    }

    /* BOTÃO ÁUDIO */
    #audio-btn {
      position: fixed;
      bottom: -13px;
      right: -10px;
      z-index: 10;
      width: 52px;
      height: 52px;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      opacity: 0.5;
      transition: opacity 0.3s;
    }
    #audio-btn:hover { opacity: 1; }
    #audio-btn.ativo { opacity: 1; }
    #audio-btn.sem-funcao { pointer-events: none; opacity: 0.3; }
    #audio-btn:focus { outline: none; }
    #audio-btn img { width: 100%; height: 100%; object-fit: contain; }

    /* BOTÃO SERVIDORES */
    #btn-servidores {
      position: fixed;
      bottom: 0px;
      left: 0px;
      z-index: 10;
      width: 80px;
      height: 80px;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      opacity: 0;
      transition: opacity 2s ease;
    }
    #btn-servidores:hover { opacity: 1 !important; }
    #btn-servidores:focus { outline: none; }
    #btn-servidores img { width: 80px; height: 80px; object-fit: fill; }

    /* BRASÃO CORVINAL */
    #brasao-corvinal {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      opacity: 0;
      transition: opacity 2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: max-content;
    }
    #brasao-corvinal.visivel { opacity: 1; }
    #brasao-corvinal img {
      width: 400px;
      height: auto;
      animation: flutuar 3s ease-in-out infinite, brilho 2.5s ease-in-out infinite;
    }
    #brasao-corvinal p {
      text-align: center;
      color: #ffffff;
      font-family: 'HarryPotter', serif;
      font-size: 48px;
      letter-spacing: 2px;
      margin-top: -30px;
      text-shadow: 1px 1px 0px #000, -1px -1px 0px #000, 1px -1px 0px #000, -1px 1px 0px #000, 2px 2px 4px #000;
      animation: flutuar 3s ease-in-out infinite;
    }

    /* BRASÃO SONSERINA */
    #brasao-sonserina {
      position: fixed;
      top: 420px;
      left: 20px;
      z-index: 10;
      opacity: 0;
      transition: opacity 2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #brasao-sonserina.visivel { opacity: 1; }
    #brasao-sonserina img {
      width: 220px;
      height: auto;
    }

    /* ANIMAÇÕES */
    @keyframes flutuar {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }
    @keyframes brilho {
      0%   { filter: drop-shadow(0 0 8px #4a90d9) drop-shadow(0 0 20px #1a5fa8) drop-shadow(0 0 40px #0d3b6e); }
      50%  { filter: drop-shadow(0 0 18px #7ab8ff) drop-shadow(0 0 40px #3a80d9) drop-shadow(0 0 80px #1a5fa8); }
      100% { filter: drop-shadow(0 0 8px #4a90d9) drop-shadow(0 0 20px #1a5fa8) drop-shadow(0 0 40px #0d3b6e); }
    }

    /* BOTÕES LATERAIS DIREITA */
    #botoes-direita {
      position: fixed;
      right: -15px;
      top: 12px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      opacity: 0;
      transition: opacity 2s ease;
    }
    .btn-lateral {
      width: 80px;
      height: 80px;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      opacity: 0.7;
      transition: opacity 0.3s;
    }
    .btn-lateral:hover { opacity: 1; }
    .btn-lateral:focus { outline: none; }
    .btn-lateral img { width: 100%; height: 100%; object-fit: contain; }
  </style>
</head>
<body>

  <div id="overlay"></div>

  <!-- VÍDEO 1 — INTRO -->
  <div id="wrap1" class="video-wrap">
    <iframe id="player1"
      src="https://player.vimeo.com/video/1177984857?autoplay=1&muted=0&controls=0&title=0&byline=0&portrait=0&badge=0&dnt=1&api=1"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>

  <!-- VÍDEO 2 — LOOP (rodando em background desde o início, invisível) -->
  <div id="wrap2" class="video-wrap oculto">
    <iframe id="player2"
      src="https://player.vimeo.com/video/1178003266?autoplay=1&loop=1&muted=1&controls=0&title=0&byline=0&portrait=0&badge=0&dnt=1&background=1&api=1"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>

  <button id="audio-btn" title="Ativar/desativar som">
    <img src="imagens/botao-audio.png" alt="Som">
  </button>

  <button id="btn-servidores" title="Servidores">
    <img src="imagens/botao-servidores.png" alt="Servidores">
  </button>

  <div id="brasao-corvinal">
    <img src="imagens/brasao-corvinal.png" alt="Brasão Corvinal">
    <p>Vencedora da Taça das Casas</p>
  </div>

  <div id="brasao-sonserina">
    <img src="imagens/brasao-sonserina.png" alt="Brasão Sonserina">
  </div>

  <div id="botoes-direita">
    <button class="btn-lateral" id="btn-regras" title="Regras">
      <img src="imagens/botao-regras.png" alt="Regras">
    </button>
    <button class="btn-lateral" id="btn-livros" title="Livros">
      <img src="imagens/botao-livros.png" alt="Livros">
    </button>
    <button class="btn-lateral" id="btn-filmes" title="Filmes">
      <img src="imagens/botao-filmes.png" alt="Filmes">
    </button>
    <button class="btn-lateral" id="btn-jornal" title="Jornal">
      <img src="imagens/botao-jornal.png" alt="Jornal">
    </button>
  </div>

  <script src="https://player.vimeo.com/api/player.js"></script>
  <script>
    const audioBtn = document.getElementById('audio-btn');
    const wrap1    = document.getElementById('wrap1');
    const wrap2    = document.getElementById('wrap2');

    const player1 = new Vimeo.Player('player1');
    const player2 = new Vimeo.Player('player2');

    let intro = true;
    let muted = false;
    let trocando = false;

    function fazerTroca() {
      if (trocando) return;
      trocando = true;
      intro = false;
      audioBtn.classList.add('sem-funcao');
      audioBtn.classList.remove('ativo');

      wrap2.classList.remove('oculto');
      setTimeout(() => {
        wrap1.classList.add('oculto');
        document.getElementById('botoes-direita').style.opacity = '1';
        document.getElementById('btn-servidores').style.opacity = '0.5';
        document.getElementById('brasao-corvinal').classList.add('visivel');
        document.getElementById('brasao-sonserina').classList.add('visivel');
        setTimeout(() => {
          wrap1.style.display = 'none';
        }, 2000);
      }, 50);
    }

    player1.on('timeupdate', function(data) {
      player1.getDuration().then(function(duracao) {
        if (!trocando && duracao - data.seconds <= 1.5) {
          fazerTroca();
        }
      });
    });

    player1.on('ended', fazerTroca);

    audioBtn.addEventListener('click', () => {
      if (!intro) return;
      muted = !muted;
      player1.setVolume(muted ? 0 : 1);
      audioBtn.classList.toggle('ativo', !muted);
    });
  </script>
</body>
</html>
