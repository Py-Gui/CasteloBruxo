<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Castelo Bruxo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .video-wrap {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      opacity: 1;
      transition: opacity 2s ease;
    }

    .video-wrap.oculto {
      opacity: 0;
      pointer-events: none;
    }

    iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 120vw;
      height: 67.5vw;
      min-height: 120vh;
      min-width: 213.33vh;
      transform: translate(-50%, -50%);
      border: none;
      pointer-events: none;
    }

    #wrap2 iframe {
      width: 120vw;
      height: 67.5vw;
      min-height: 120vh;
      min-width: 213.33vh;
    }

    @media (max-width: 768px) {
      #wrap2 iframe {
        width: 92vw;
        height: 67.5vw;
        min-height: 92vh;
        min-width: 213.33vh;
      }
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 5;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.5s ease;
    }

    #audio-btn {
      position: fixed;
      bottom: -13px;
      right: -10px;
      z-index: 10;
      width: 52px;
      height: 52px;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      opacity: 0.5;
      transition: opacity 0.3s;
    }

    #audio-btn:hover { opacity: 1; }
    #audio-btn.ativo { opacity: 1; }
    #audio-btn.sem-funcao { pointer-events: none; opacity: 0.3; }
    #audio-btn:focus { outline: none; }

    #audio-btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #btn-servidores {
      position: fixed;
      bottom: -13px;
      left: -10px;
      z-index: 10;
      width: 60px;
      height: 60px;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      opacity: 0;
      transition: opacity 0.3s, opacity 2s ease;
    }

    #btn-servidores:hover { opacity: 1; }
    #btn-servidores:focus { outline: none; }

    #btn-servidores img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #botoes-direita {
      position: fixed;
      right: -15px;
      top: 12px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      opacity: 0;
      transition: opacity 2s ease;
    }

    .btn-lateral {
      width: 80px;
      height: 80px;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      opacity: 0.7;
      transition: opacity 0.3s;
      mix-blend-mode: screen;
    }

    .btn-lateral:hover { opacity: 1; }
    .btn-lateral:focus { outline: none; }

    .btn-lateral img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>

  <div id="overlay"></div>

  <!-- VÍDEO 1 — INTRO -->
  <div id="wrap1" class="video-wrap">
    <iframe id="player1"
      src="https://player.vimeo.com/video/1177984857?autoplay=1&muted=0&controls=0&title=0&byline=0&portrait=0&badge=0&dnt=1&api=1"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>

  <!-- VÍDEO 2 — LOOP (rodando em background desde o início, invisível) -->
  <div id="wrap2" class="video-wrap oculto">
    <iframe id="player2"
      src="https://player.vimeo.com/video/1178003266?autoplay=1&loop=1&muted=1&controls=0&title=0&byline=0&portrait=0&badge=0&dnt=1&background=1&api=1"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>

  <button id="audio-btn" title="Ativar/desativar som">
    <img src="imagens/botao-audio.png" alt="Som">
  </button>

  <button id="btn-servidores" title="Servidores">
    <img src="imagens/botao-servidores.png" alt="Servidores">
  </button>

  <div id="botoes-direita">
    <button class="btn-lateral" id="btn-regras" title="Regras">
      <img src="imagens/botao-regras.png" alt="Regras">
    </button>
    <button class="btn-lateral" id="btn-livros" title="Livros">
      <img src="imagens/botao-livros.png" alt="Livros">
    </button>
    <button class="btn-lateral" id="btn-filmes" title="Filmes">
      <img src="imagens/botao-filmes.png" alt="Filmes">
    </button>
    <button class="btn-lateral" id="btn-jornal" title="Jornal">
      <img src="imagens/botao-jornal.png" alt="Jornal">
    </button>
  </div>

  <script src="https://player.vimeo.com/api/player.js"></script>
  <script>
    const audioBtn = document.getElementById('audio-btn');
    const wrap1    = document.getElementById('wrap1');
    const wrap2    = document.getElementById('wrap2');

    const player1 = new Vimeo.Player('player1');
    const player2 = new Vimeo.Player('player2');

    let intro = true;
    let muted = false;
    let trocando = false;

    function fazerTroca() {
      if (trocando) return;
      trocando = true;
      intro = false;
      audioBtn.classList.add('sem-funcao');
      audioBtn.classList.remove('ativo');

      // Crossfade direto para vídeo 2
      wrap2.classList.remove('oculto');
      setTimeout(() => {
        wrap1.classList.add('oculto');
        document.getElementById('botoes-direita').style.opacity = '1';
        document.getElementById('btn-servidores').style.opacity = '0.5';
        setTimeout(() => {
          wrap1.style.display = 'none';
        }, 2000);
      }, 50);
    }

    // Antecipa a troca 1.5s antes do fim para evitar a tela de encerramento do Vimeo
    player1.on('timeupdate', function(data) {
      player1.getDuration().then(function(duracao) {
        if (!trocando && duracao - data.seconds <= 1.5) {
          fazerTroca();
        }
      });
    });

    // Fallback: garante a troca caso o timeupdate não pegue
    player1.on('ended', fazerTroca);

    // Botão de áudio — só funciona no vídeo 1
    audioBtn.addEventListener('click', () => {
      if (!intro) return;
      muted = !muted;
      player1.setVolume(muted ? 0 : 1);
      audioBtn.classList.toggle('ativo', !muted);
    });
  </script>
</body>
</html>
