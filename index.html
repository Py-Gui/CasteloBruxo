<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Castelo Bruxo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .video-wrap {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      opacity: 1;
      transition: opacity 2s ease;
    }

    .video-wrap.oculto {
      opacity: 0;
      pointer-events: none;
    }

    iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 120vw;
      height: 67.5vw;
      min-height: 120vh;
      min-width: 213.33vh;
      transform: translate(-50%, -50%);
      border: none;
      pointer-events: none;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 5;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.5s ease;
    }

    #audio-btn {
      position: fixed;
      bottom: -8px;
      right: -10px;
      z-index: 10;
      width: 52px;
      height: 52px;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      opacity: 0.5;
      transition: opacity 0.3s;
    }

    #audio-btn:hover { opacity: 1; }
    #audio-btn.ativo { opacity: 1; }
    #audio-btn.sem-funcao { pointer-events: none; opacity: 0.3; }
    #audio-btn:focus { outline: none; }

    #audio-btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>

  <div id="overlay"></div>

  <!-- VÍDEO 1 — INTRO -->
  <div id="wrap1" class="video-wrap">
    <iframe id="player1"
      src="https://player.vimeo.com/video/1177984857?autoplay=1&muted=0&controls=0&title=0&byline=0&portrait=0&badge=0&dnt=1&api=1"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>

  <!-- VÍDEO 2 — LOOP (carregado mas pausado) -->
  <div id="wrap2" class="video-wrap oculto">
    <iframe id="player2"
      src="https://player.vimeo.com/video/1178003266?autoplay=0&loop=1&muted=1&controls=0&title=0&byline=0&portrait=0&badge=0&dnt=1&background=1&api=1"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>

  <button id="audio-btn" title="Ativar/desativar som">
    <img src="imagens/botao-audio.png" alt="Som">
  </button>

  <script src="https://player.vimeo.com/api/player.js"></script>
  <script>
    const audioBtn = document.getElementById('audio-btn');
    const wrap1    = document.getElementById('wrap1');
    const wrap2    = document.getElementById('wrap2');

    const player1 = new Vimeo.Player('player1');
    const player2 = new Vimeo.Player('player2');

    let intro = true;
    let muted = false;
    let video2Iniciado = false;

    // Pré-inicia o vídeo 2 com antecedência para garantir buffering
    player1.on('timeupdate', function(data) {
      if (!video2Iniciado) {
        player1.getDuration().then(function(duracao) {
          const restante = duracao - data.seconds;
          if (restante <= 8) {
            video2Iniciado = true;
            // Garante que começa do início e deixa rodar no background
            player2.setCurrentTime(0).then(() => {
              player2.play();
            });
          }
        });
      }
    });

    // Quando vídeo 1 terminar, crossfade direto para vídeo 2
    player1.on('ended', function() {
      intro = false;
      audioBtn.classList.add('sem-funcao');
      audioBtn.classList.remove('ativo');

      // Garante que vídeo 2 está rodando
      player2.play();

      // Revela wrap2 e some wrap1 ao mesmo tempo (crossfade)
      wrap2.classList.remove('oculto');
      setTimeout(() => {
        wrap1.classList.add('oculto');
        setTimeout(() => {
          wrap1.style.display = 'none';
        }, 2000); // remove do DOM após o fade
      }, 50);
    });

    // Botão de áudio — só funciona no vídeo 1
    audioBtn.addEventListener('click', () => {
      if (!intro) return;
      muted = !muted;
      player1.setVolume(muted ? 0 : 1);
      audioBtn.classList.toggle('ativo', !muted);
    });
  </script>
</body>
</html>
