<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Castelo Bruxo</title>
  <style>
    @font-face {
      font-family: 'HarryPotter';
      src: url('imagens/HARRYP__.TTF') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .video-wrap {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      opacity: 1;
      transition: opacity 2s ease;
    }

    .video-wrap.oculto {
      opacity: 0;
      pointer-events: none;
    }

    .video-wrap iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 120vw;
      height: 67.5vw;
      min-height: 120vh;
      min-width: 213.33vh;
      transform: translate(-50%, -50%);
      border: none;
      pointer-events: none;
    }

    #wrap2 iframe {
      width: 120vw;
      height: 67.5vw;
      min-height: 120vh;
      min-width: 213.33vh;
    }

    @media (max-width: 768px) {
      #wrap2 iframe {
        width: 92vw;
        height: 67.5vw;
        min-height: 92vh;
        min-width: 213.33vh;
      }
      #brasao-corvinal img {
        width: 220px;
      }
      #brasoes-linha {
        bottom: 180px !important;
        align-items: flex-end;
      }
      #brasoes-linha img {
        width: 120px !important;
      }
      #brasoes-linha img#brasao-sonserina {
        width: 200px !important;
        position: relative;
        top: -30px;
        right: -60px;
      }
      #brasoes-linha img#brasao-grifinoria {
        width: 180px !important;
        position: relative;
        top: 70px;
        right: -40px;
      }
      #brasoes-linha img#brasao-lufalufa {
        width: 120px !important;
        position: relative;
        top: 200px;
        right: 210px;
      }
    }

    /* BLOQUEIO DESKTOP */
    #bloqueio-desktop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      text-align: center;
      padding: 40px;
    }
    #bloqueio-desktop p {
      color: #c9a84c;
      font-family: 'HarryPotter', serif;
      font-size: 28px;
      letter-spacing: 2px;
      text-shadow: 0 0 10px #c9a84c88;
    }
    #bloqueio-desktop span {
      color: #ffffff99;
      font-family: sans-serif;
      font-size: 14px;
      letter-spacing: 1px;
    }
    @media (min-width: 769px) {
      #bloqueio-desktop { display: flex; }
    }

    /* MODAL JORNAL */
    #modal-jornal {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    #modal-jornal.visivel {
      opacity: 1;
      pointer-events: auto;
    }
    #modal-jornal iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 120vw;
      height: 67.5vw;
      min-height: 120vh;
      min-width: 213.33vh;
      transform: translate(-50%, -50%);
      border: none;
      pointer-events: auto;
    }
    #btn-fechar-jornal {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 201;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.6);
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }
    #btn-fechar-jornal:hover { background: rgba(255,255,255,0.2); }
    #btn-fechar-jornal:focus { outline: none; }

    #overlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 5;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.5s ease;
    }

    /* BOTÃO ÁUDIO */
    #audio-btn {
      position: fixed;
      bottom: -13px;
      right: -10px;
      z-index: 10;
      width: 52px;
      height: 52px;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      opacity: 0.5;
      transition: opacity 0.3s;
    }
    #audio-btn:hover { opacity: 1; }
    #audio-btn.ativo { opacity: 1; }
    #audio-btn.sem-funcao { pointer-events: none; opacity: 0.3; }
    #audio-btn:focus { outline: none; }
    #audio-btn img { width: 100%; height: 100%; object-fit: contain; }

    /* BOTÃO SERVIDORES */
    #btn-servidores {
      position: fixed;
      bottom: 0px;
      left: 0px;
      z-index: 10;
      width: 80px;
      height: 80px;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      opacity: 0;
      transition: opacity 2s ease;
    }
    #btn-servidores:hover { opacity: 1 !important; }
    #btn-servidores:focus { outline: none; }
    #btn-servidores img { width: 80px; height: 80px; object-fit: fill; }

    /* BRASÃO CORVINAL */
    #brasao-corvinal {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      opacity: 0;
      transition: opacity 2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: max-content;
    }
    #brasao-corvinal.visivel { opacity: 1; }
    #brasao-corvinal img {
      width: 400px;
      height: auto;
      animation: flutuar 3s ease-in-out infinite, brilho 2.5s ease-in-out infinite;
    }
    #brasao-corvinal p {
      text-align: center;
      color: #ffffff;
      font-family: 'HarryPotter', serif;
      font-size: 48px;
      letter-spacing: 2px;
      margin-top: -30px;
      text-shadow: 1px 1px 0px #000, -1px -1px 0px #000, 1px -1px 0px #000, -1px 1px 0px #000, 2px 2px 4px #000;
      animation: flutuar 3s ease-in-out infinite;
    }

    /* BRASÕES SECUNDÁRIOS — linha centralizada */
    #brasoes-linha {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      opacity: 0;
      transition: opacity 2s ease;
    }
    #brasoes-linha.visivel { opacity: 1; }
    #brasoes-linha img {
      width: 280px;
      height: auto;
      max-width: none;
    }

    /* ANIMAÇÕES */
    @keyframes flutuar {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }
    @keyframes brilho {
      0%   { filter: drop-shadow(0 0 8px #4a90d9) drop-shadow(0 0 20px #1a5fa8) drop-shadow(0 0 40px #0d3b6e); }
      50%  { filter: drop-shadow(0 0 18px #7ab8ff) drop-shadow(0 0 40px #3a80d9) drop-shadow(0 0 80px #1a5fa8); }
      100% { filter: drop-shadow(0 0 8px #4a90d9) drop-shadow(0 0 20px #1a5fa8) drop-shadow(0 0 40px #0d3b6e); }
    }

    /* BOTÕES LATERAIS DIREITA */
    #botoes-direita {
      position: fixed;
      right: -15px;
      top: 12px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 2s ease;
    }
    .btn-lateral {
      width: 80px;
      height: 80px;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      opacity: 0.7;
      transition: opacity 0.3s;
    }
    .btn-lateral:hover { opacity: 1; }
    .btn-lateral:focus { outline: none; }
    .btn-lateral img { width: 100%; height: 100%; object-fit: contain; }

    /* POPUP RITA */
    #popup-rita {
      position: fixed;
      inset: 0;
      z-index: 150;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #popup-rita.visivel {
      opacity: 1;
      pointer-events: auto;
    }
    #popup-rita-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 85vw;
      max-width: 320px;
    }
    #popup-rita-inner img {
      width: 100%;
      height: auto;
      border-radius: 8px;
    }
    #pin-display {
      font-family: monospace;
      font-size: 28px;
      letter-spacing: 10px;
      color: #c9a84c;
      background: rgba(0,0,0,0.6);
      border: 1px solid #c9a84c55;
      border-radius: 8px;
      padding: 10px 20px;
      width: 100%;
      text-align: center;
      min-height: 52px;
    }
    #pin-erro {
      color: #ff4444;
      font-family: sans-serif;
      font-size: 13px;
      height: 18px;
    }
    #pin-teclado {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
    }
    .pin-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 22px;
      padding: 14px 0;
      cursor: pointer;
      transition: background 0.2s;
    }
    .pin-btn:hover { background: rgba(255,255,255,0.18); }
    .pin-btn:active { background: rgba(201,168,76,0.3); }
    .pin-btn:focus { outline: none; }
    .pin-btn.apagar { font-size: 18px; color: #ff8888; }
    .pin-btn.confirmar {
      grid-column: span 2;
      background: rgba(201,168,76,0.2);
      border-color: #c9a84c88;
      color: #c9a84c;
      font-size: 16px;
    }
    .pin-btn.confirmar:hover { background: rgba(201,168,76,0.35); }
    #btn-fechar-rita {
      background: transparent;
      border: none;
      color: #ffffff55;
      font-size: 13px;
      cursor: pointer;
      font-family: sans-serif;
      text-decoration: underline;
    }

    /* POPUP RITA */
    #popup-rita {
      position: fixed;
      inset: 0;
      z-index: 150;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #popup-rita.visivel {
      opacity: 1;
      pointer-events: auto;
    }
    #popup-rita-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 85vw;
      max-width: 320px;
    }
    #popup-rita-inner img {
      width: 100%;
      height: auto;
      border-radius: 8px;
    }
    #pin-display {
      font-family: monospace;
      font-size: 28px;
      letter-spacing: 10px;
      color: #c9a84c;
      background: rgba(0,0,0,0.6);
      border: 1px solid #c9a84c55;
      border-radius: 8px;
      padding: 10px 20px;
      width: 100%;
      text-align: center;
      min-height: 52px;
    }
    #pin-erro {
      color: #ff4444;
      font-family: sans-serif;
      font-size: 13px;
      height: 18px;
    }
    #pin-teclado {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
    }
    .pin-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 22px;
      padding: 14px 0;
      cursor: pointer;
      transition: background 0.2s;
    }
    .pin-btn:hover { background: rgba(255,255,255,0.18); }
    .pin-btn:active { background: rgba(201,168,76,0.3); }
    .pin-btn:focus { outline: none; }
    .pin-btn.apagar { font-size: 18px; color: #ff8888; }
    .pin-btn.confirmar {
      grid-column: span 2;
      background: rgba(201,168,76,0.2);
      border-color: #c9a84c88;
      color: #c9a84c;
      font-size: 16px;
    }
    .pin-btn.confirmar:hover { background: rgba(201,168,76,0.35); }
  </style>
</head>
<body>

  <!-- BLOQUEIO DESKTOP -->
  <div id="bloqueio-desktop">
    <p>Castelo Bruxo</p>
    <span>Este site foi feito para dispositivos móveis.</span>
    <span>Acesse pelo seu celular. 📱</span>
  </div>

  <div id="overlay"></div>

  <!-- VÍDEO 1 — INTRO -->
  <div id="wrap1" class="video-wrap">
    <iframe id="player1"
      src="https://player.vimeo.com/video/1177984857?autoplay=1&muted=1&controls=0&title=0&byline=0&portrait=0&badge=0&dnt=1&api=1"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>

  <!-- VÍDEO 2 — LOOP (rodando em background desde o início, invisível) -->
  <div id="wrap2" class="video-wrap oculto">
    <iframe id="player2"
      src="https://player.vimeo.com/video/1178003266?autoplay=1&loop=1&muted=1&controls=0&title=0&byline=0&portrait=0&badge=0&dnt=1&background=1&api=1"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>

  <button id="audio-btn" title="Ativar/desativar som">
    <img src="imagens/botao-audio.png" alt="Som">
  </button>

  <button id="btn-servidores" title="Servidores">
    <img src="imagens/botao-servidores.png" alt="Servidores">
  </button>

  <div id="brasao-corvinal">
    <img src="imagens/brasao-corvinal.png" alt="Brasão Corvinal">
  </div>

  <div id="brasoes-linha">
    <img id="brasao-sonserina" src="imagens/brasao-sonserina.png" alt="Brasão Sonserina">
    <img id="brasao-grifinoria" src="imagens/brasao-grifinoria.png" alt="Brasão Grifinória">
    <img id="brasao-lufalufa" src="imagens/brasao-lufalufa.png" alt="Brasão Lufa-Lufa">
  </div>

  <div id="botoes-direita">
    <button class="btn-lateral" id="btn-regras" title="Regras">
      <img src="imagens/botao-regras.png" alt="Regras">
    </button>
    <button class="btn-lateral" id="btn-livros" title="Livros">
      <img src="imagens/botao-livros.png" alt="Livros">
    </button>
    <button class="btn-lateral" id="btn-filmes" title="Filmes">
      <img src="imagens/botao-filmes.png" alt="Filmes">
    </button>
    <button class="btn-lateral" id="btn-jornal" title="Jornal">
      <img src="imagens/botao-jornal.png" alt="Jornal">
    </button>
  </div>

  <!-- POPUP RITA — SENHA -->
  <div id="popup-rita">
    <div id="popup-rita-inner">
      <img src="imagens/poupup-rita.png" alt="Rita Skeeter">
      <div id="pin-display">&#8226;</div>
      <div id="pin-erro"></div>
      <div id="pin-teclado">
        <button class="pin-btn" data-n="1">1</button>
        <button class="pin-btn" data-n="2">2</button>
        <button class="pin-btn" data-n="3">3</button>
        <button class="pin-btn" data-n="4">4</button>
        <button class="pin-btn" data-n="5">5</button>
        <button class="pin-btn" data-n="6">6</button>
        <button class="pin-btn" data-n="7">7</button>
        <button class="pin-btn" data-n="8">8</button>
        <button class="pin-btn" data-n="9">9</button>
        <button class="pin-btn apagar" id="pin-apagar">⌫</button>
        <button class="pin-btn" data-n="0">0</button>
        <button class="pin-btn confirmar" id="pin-confirmar">Entrar</button>
      </div>
      <button id="btn-fechar-rita">Cancelar</button>
    </div>
  </div>

  <!-- MODAL JORNAL -->
  <div id="modal-jornal">
    <button id="btn-fechar-jornal" title="Voltar">&#8592;</button>
    <iframe id="player-jornal"
      src="https://player.vimeo.com/video/1179951221?autoplay=1&loop=1&muted=1&controls=0&title=0&byline=0&portrait=0&badge=0&dnt=1"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>

  <script src="https://player.vimeo.com/api/player.js"></script>
  <script>
    const audioBtn        = document.getElementById('audio-btn');
    const wrap1           = document.getElementById('wrap1');
    const wrap2           = document.getElementById('wrap2');
    const modalJornal     = document.getElementById('modal-jornal');
    const btnJornal       = document.getElementById('btn-jornal');
    const btnFecharJornal = document.getElementById('btn-fechar-jornal');
    const popupRita       = document.getElementById('popup-rita');
    const pinDisplay      = document.getElementById('pin-display');
    const pinErro         = document.getElementById('pin-erro');
    const btnFecharRita   = document.getElementById('btn-fechar-rita');

    const player1      = new Vimeo.Player('player1');
    const player2      = new Vimeo.Player('player2');
    const playerJornal = new Vimeo.Player('player-jornal');

    let intro      = true;
    let muted      = true;
    let trocando   = false;
    let pinAtual   = '';
    const SENHA    = '02051998';

    // ÁUDIO
    audioBtn.addEventListener('click', () => {
      if (!intro) return;
      muted = !muted;
      if (muted) {
        player1.setVolume(0).then(() => {
          audioBtn.classList.remove('ativo');
        });
      } else {
        player1.setVolume(1).then(() => {
          audioBtn.classList.add('ativo');
        });
      }
    });

    // TROCA VÍDEO 1 → VÍDEO 2
    function fazerTroca() {
      if (trocando) return;
      trocando = true;
      intro = false;
      audioBtn.classList.add('sem-funcao');
      audioBtn.classList.remove('ativo');
      wrap2.classList.remove('oculto');
      setTimeout(() => {
        wrap1.classList.add('oculto');
        const botoesDireita = document.getElementById('botoes-direita');
        botoesDireita.style.opacity = '1';
        botoesDireita.style.pointerEvents = 'auto';
        document.getElementById('btn-servidores').style.opacity = '0.5';
        document.getElementById('brasao-corvinal').classList.add('visivel');
        document.getElementById('brasoes-linha').classList.add('visivel');
        setTimeout(() => { wrap1.style.display = 'none'; }, 2000);
      }, 50);
    }

    player1.on('timeupdate', function(data) {
      player1.getDuration().then(function(duracao) {
        if (!trocando && duracao - data.seconds <= 1.5) fazerTroca();
      });
    });
    player1.on('ended', fazerTroca);

    // PIN — atualiza display
    function atualizarDisplay() {
      pinDisplay.textContent = pinAtual.length > 0
        ? '●'.repeat(pinAtual.length)
        : '●';
    }

    // PIN — botões numéricos
    document.querySelectorAll('.pin-btn[data-n]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (pinAtual.length >= 10) return;
        pinAtual += btn.dataset.n;
        pinErro.textContent = '';
        atualizarDisplay();
      });
    });

    // PIN — apagar
    document.getElementById('pin-apagar').addEventListener('click', () => {
      pinAtual = pinAtual.slice(0, -1);
      pinErro.textContent = '';
      atualizarDisplay();
    });

    // PIN — confirmar
    document.getElementById('pin-confirmar').addEventListener('click', () => {
      if (pinAtual === SENHA) {
        popupRita.classList.remove('visivel');
        pinAtual = '';
        atualizarDisplay();
        playerJornal.setVolume(1);
        modalJornal.classList.add('visivel');
      } else {
        pinErro.textContent = 'Senha incorreta. Tente novamente.';
        pinAtual = '';
        atualizarDisplay();
      }
    });

    // BOTÃO JORNAL — abre popup rita
    btnJornal.addEventListener('click', () => {
      pinAtual = '';
      pinErro.textContent = '';
      atualizarDisplay();
      popupRita.classList.add('visivel');
    });

    // FECHAR RITA
    btnFecharRita.addEventListener('click', () => {
      popupRita.classList.remove('visivel');
      pinAtual = '';
      atualizarDisplay();
    });

    // FECHAR JORNAL
    btnFecharJornal.addEventListener('click', () => {
      playerJornal.setVolume(0);
      modalJornal.classList.remove('visivel');
    });
  </script>
</body>
</html>
