<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Castelo Bruxo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #video-wrap {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
    }

    #vimeo-player {
      position: absolute;
      top: 50%;
      left: 50%;
      /* ligeiramente maior que 100% para cobrir tarjas */
      width: 120vw;
      height: 67.5vw;   /* 110 * 9/16 */
      min-height: 120vh;
      min-width: 213.33vh; /* 110 * 16/9 */
      transform: translate(-50%, -50%);
      border: none;
      pointer-events: none;
    }

    #audio-btn {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 10;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0,0,0,0.55);
      border: 1px solid #d4af37;
      color: #d4af37;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s, color 0.3s;
    }

    #audio-btn:hover {
      background: #d4af37;
      color: #000;
    }
  </style>
</head>
<body>

  <div id="video-wrap">
    <iframe
      id="vimeo-player"
      src="https://player.vimeo.com/video/1177984857?autoplay=1&loop=1&muted=1&controls=0&title=0&byline=0&portrait=0&badge=0&dnt=1&background=1"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>

  <button id="audio-btn" title="Ativar/desativar som">🔇</button>

  <script>
    const audioBtn = document.getElementById('audio-btn');
    const iframe   = document.getElementById('vimeo-player');
    let muted = true;

    function sendVimeo(method, value) {
      iframe.contentWindow.postMessage(
        JSON.stringify({ method, value }),
        'https://player.vimeo.com'
      );
    }

    audioBtn.addEventListener('click', () => {
      muted = !muted;
      sendVimeo('setVolume', muted ? 0 : 1);
      audioBtn.textContent = muted ? '🔇' : '🔊';
    });
  </script>
</body>
</html>
