<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Castelo Bruxo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .video-wrap {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      transition: opacity 1s ease;
    }

    .video-wrap.oculto {
      opacity: 0;
      pointer-events: none;
    }

    .video-wrap iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 120vw;
      height: 67.5vw;
      min-height: 120vh;
      min-width: 213.33vh;
      transform: translate(-50%, -50%);
      border: none;
      pointer-events: none;
    }

    #audio-btn {
      position: fixed;
      bottom: -10px;
      right: -10px;
      z-index: 10;
      width: 52px;
      height: 52px;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    #audio-btn.visivel { opacity: 0.5; pointer-events: all; }
    #audio-btn.visivel:hover { opacity: 1; }
    #audio-btn.ativo { opacity: 1; }
    #audio-btn:focus { outline: none; }

    #audio-btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>

  <!-- VÍDEO 1 — INTRO -->
  <div id="wrap1" class="video-wrap">
    <iframe
      id="player1"
      src="https://player.vimeo.com/video/1177984857?autoplay=1&muted=0&controls=0&title=0&byline=0&portrait=0&badge=0&dnt=1&background=0"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>

  <!-- VÍDEO 2 — LOOP -->
  <div id="wrap2" class="video-wrap oculto">
    <iframe
      id="player2"
      src="https://player.vimeo.com/video/1178003266?autoplay=0&loop=1&muted=1&controls=0&title=0&byline=0&portrait=0&badge=0&dnt=1&background=1"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>

  <button id="audio-btn" title="Ativar/desativar som">
    <img src="imagens/botao-audio.png" alt="Som">
  </button>

  <script>
    const wrap1    = document.getElementById('wrap1');
    const wrap2    = document.getElementById('wrap2');
    const player1  = document.getElementById('player1');
    const player2  = document.getElementById('player2');
    const audioBtn = document.getElementById('audio-btn');
    let muted = true;

    function sendVimeo(iframe, method, value) {
      iframe.contentWindow.postMessage(
        JSON.stringify({ method, value }),
        'https://player.vimeo.com'
      );
    }

    function iniciarVideo2() {
      // Fade out vídeo 1
      wrap1.classList.add('oculto');

      // Inicia vídeo 2
      setTimeout(() => {
        wrap1.style.display = 'none';
        wrap2.classList.remove('oculto');
        sendVimeo(player2, 'play', null);
        // Mostra botão de áudio
        audioBtn.classList.add('visivel');
      }, 1000);
    }

    // Escuta eventos do Vimeo
    window.addEventListener('message', function(e) {
      if (e.origin !== 'https://player.vimeo.com') return;
      try {
        const data = JSON.parse(e.data);
        if (data.event === 'finish') {
          iniciarVideo2();
        }
      } catch(_) {}
    });

    // Registra evento de fim no player 1
    player1.addEventListener('load', () => {
      sendVimeo(player1, 'addEventListener', 'finish');
    });

    // Botão de áudio controla o vídeo 2
    audioBtn.addEventListener('click', () => {
      muted = !muted;
      sendVimeo(player2, 'setVolume', muted ? 0 : 1);
      audioBtn.classList.toggle('ativo', !muted);
    });
  </script>
</body>
</html>
