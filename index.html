<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Castelo Bruxo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #video-wrap {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
    }

    #player {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 120vw;
      height: 67.5vw;
      min-height: 120vh;
      min-width: 213.33vh;
      transform: translate(-50%, -50%);
      border: none;
      pointer-events: none;
    }

    #audio-btn {
      position: fixed;
      bottom: -20px;
      right: -10px;
      z-index: 10;
      width: 52px;
      height: 52px;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    #audio-btn.visivel { opacity: 0.5; pointer-events: all; }
    #audio-btn.visivel:hover { opacity: 1; }
    #audio-btn.ativo { opacity: 1; }
    #audio-btn:focus { outline: none; }

    #audio-btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>

  <div id="video-wrap">
    <iframe
      id="player"
      src="https://player.vimeo.com/video/1177984857?autoplay=1&muted=0&controls=0&title=0&byline=0&portrait=0&badge=0&dnt=1"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>

  <button id="audio-btn" title="Ativar/desativar som">
    <img src="imagens/botao-audio.png" alt="Som">
  </button>

  <script>
    const player   = document.getElementById('player');
    const audioBtn = document.getElementById('audio-btn');
    let muted = true;
    let intro = true;

    function sendVimeo(method, value) {
      player.contentWindow.postMessage(
        JSON.stringify({ method, value }),
        'https://player.vimeo.com'
      );
    }

    function iniciarVideo2() {
      intro = false;
      // Troca o src para o vídeo 2 em loop, mudo
      player.src = "https://player.vimeo.com/video/1178003266?autoplay=1&loop=1&muted=1&controls=0&title=0&byline=0&portrait=0&badge=0&dnt=1&background=1";
      muted = true;
      audioBtn.classList.add('visivel');
      audioBtn.classList.remove('ativo');
    }

    // Escuta eventos do Vimeo
    window.addEventListener('message', function(e) {
      if (e.origin !== 'https://player.vimeo.com') return;
      try {
        const data = JSON.parse(e.data);
        if (data.event === 'finish' && intro) {
          iniciarVideo2();
        }
      } catch(_) {}
    });

    // Registra evento de fim
    player.addEventListener('load', () => {
      sendVimeo('addEventListener', 'finish');
    });

    // Botão de áudio
    audioBtn.addEventListener('click', () => {
      muted = !muted;
      sendVimeo('setVolume', muted ? 0 : 1);
      audioBtn.classList.toggle('ativo', !muted);
    });
  </script>
</body>
</html>
